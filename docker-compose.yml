version: "3.9"

services:
  # ─── PostgreSQL Database ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: axiomx-db
    environment:
      POSTGRES_USER: axiomx
      POSTGRES_PASSWORD: axiomx
      POSTGRES_DB: axiomx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axiomx"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis Cache & Message Broker ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: axiomx-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ──────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: axiomx-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://axiomx:axiomx@postgres:5432/axiomx
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
